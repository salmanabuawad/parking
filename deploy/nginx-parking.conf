# --- parking.kortexd.com ---
server {
    listen 80;
    server_name parking.kortexd.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://parking.kortexd.com$request_uri; }
}
server {
    listen 443 ssl;
    server_name parking.kortexd.com;
    ssl_certificate     /etc/letsencrypt/live/parking.kortexd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/parking.kortexd.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 100M;

    location = /index.html {
        root /opt/advancedparking/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_error;
    }

    location @api_error {
        default_type application/json;
        return 503 '{"detail":"Service temporarily unavailable"}';
    }

    location / {
        root /opt/advancedparking/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

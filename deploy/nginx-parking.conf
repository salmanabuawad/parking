server {
    listen 80;
    listen 443 ssl;
    server_name 185.229.226.37 localhost;
    ssl_certificate     /etc/letsencrypt/live/wavelync.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wavelync.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 100M;
    root /opt/parking/frontend/dist;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_error;
    }

    location @api_error {
        default_type application/json;
        return 503 '{"detail":"Service temporarily unavailable"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

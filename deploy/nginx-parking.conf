# Nginx server block for Parking Enforcement app (Ubuntu).
# Installed by deploy/setup-ubuntu.sh to /etc/nginx/sites-available/parking.
# Serves static frontend from frontend/dist and proxies /api/ to backend on port 8000.
# HTTPS: port 443 in use, so HTTPS is on 8443. Open https://185.229.226.37:8443

server {
    listen 80;
    listen 8443 ssl;
    server_name 185.229.226.37 localhost;
    # SSL: set these when using certbot or your certs (e.g. ssl_certificate /etc/letsencrypt/live/185.229.226.37/fullchain.pem;)
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    client_max_body_size 100M;

    # API and video -> backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Frontend (static build)
    location / {
        root /opt/parking/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

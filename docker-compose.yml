version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking_secret
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://parking:parking_secret@db:5432/parking_db
      UPLOAD_DIR: /app/uploads
      VIDEOS_DIR: /app/videos
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/videos:/app/videos
    depends_on:
      - db

  worker:
    build: ./backend
    command: python run_upload_worker.py
    environment:
      DATABASE_URL: postgresql://parking:parking_secret@db:5432/parking_db
      VIDEOS_DIR: /app/videos
    volumes:
      - ./backend/videos:/app/videos
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
